services:
  db:
    image: postgres:16-alpine
    container_name: linguaai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-linguaai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD env var is required}
      POSTGRES_DB: ${POSTGRES_DB:-linguaai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port NOT exposed to host — only reachable from within Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-linguaai} -d ${POSTGRES_DB:-linguaai}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: linguaai-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-linguaai}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-linguaai}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-qwen/qwen3.6-plus:free}
      GOOGLE_AI_STUDIO_KEY: ${GOOGLE_AI_STUDIO_KEY:-}
      GOOGLE_AI_STUDIO_BASE_URL: ${GOOGLE_AI_STUDIO_BASE_URL:-https://generativelanguage.googleapis.com/v1beta/openai}
      GOOGLE_AI_STUDIO_MODEL: ${GOOGLE_AI_STUDIO_MODEL:-gemini-2.5-flash}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET env var is required}
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_MINUTES: 1440
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: linguaai-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
